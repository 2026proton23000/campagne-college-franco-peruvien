<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Frédéric Barraud</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo">Frédéric Barraud<span> · Franco-Péruvien</span></div>
            <nav>
                <a href="index.html" data-i18n="nav.accueil">Accueil</a>
                <a href="biographie.html" data-i18n="nav.biographie">Biographie</a>
                <a href="propositions.html" data-i18n="nav.propositions">Propositions</a>
                <a href="actions.html" data-i18n="nav.actions">Actions</a>
                <a href="contact.html" data-i18n="nav.contact">Contact</a>
            </nav>
            <div class="lang-switcher">
                <a href="#" data-lang="fr" class="lang-option active">FR</a>
                <a href="#" data-lang="es" class="lang-option">ES</a>
            </div>
        </div>
    </header>

    <main>
        <!-- PAGE HEADER -->
        <section class="page-header">
            <div class="container">
                <h1 data-i18n="contact.titre">Contactez-moi</h1>
            </div>
        </section>

        <!-- CONTACT GRID -->
        <div class="container">
            <div class="contact-grid">
                <!-- Informations de contact -->
                <div class="contact-info">
                    <h3 data-i18n="contact.info_titre">Informations</h3>
                    <p><i class="fas fa-map-marker-alt"></i> <span data-i18n="contact.adresse">Lima, Pérou</span></p>
                    <p><i class="fas fa-envelope"></i> <span data-i18n="contact.email">frederic.barraud@example.com</span></p>
                    <p><i class="fab fa-facebook"></i> <span data-i18n="contact.facebook">@frederic.barraud</span></p>
                </div>

                <!-- Formulaire de contact -->
                <div class="contact-form">
                    <form id="contact-form">
                        <div class="campo">
                            <label for="nombre" data-i18n="contact.nom">Nom</label>
                            <input type="text" id="nombre" required>
                        </div>
                        <div class="campo">
                            <label for="email" data-i18n="contact.email_label">Email</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="campo">
                            <label for="mensaje" data-i18n="contact.message">Message</label>
                            <textarea id="mensaje" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn-contact" data-i18n="contact.envoyer">Envoyer</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p data-i18n="footer.texte">© 2026 Frédéric Barraud · Tous droits réservés</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
